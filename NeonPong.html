<!DOCTYPE html>
<html>
<head>
  <title>Neon Paddle</title>
  <style>
    body { background: #0f0f23; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { border: 4px solid #00d2ff; border-radius: 10px; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="400"></canvas>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    let x = canvas.width/2, y = canvas.height-30, dx = 3, dy = -3;
    let paddleHeight = 10, paddleWidth = 75, paddleX = (canvas.width-paddleWidth)/2;
    let rightPressed = false, leftPressed = false;
    document.addEventListener("keydown", (e) => { if(e.key=="Right" || e.key=="ArrowRight") rightPressed=true; if(e.key=="Left" || e.key=="ArrowLeft") leftPressed=true; });
    document.addEventListener("keyup", (e) => { if(e.key=="Right" || e.key=="ArrowRight") rightPressed=false; if(e.key=="Left" || e.key=="ArrowLeft") leftPressed=false; });
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fillStyle = "#00d2ff"; ctx.fill(); ctx.closePath();
      ctx.beginPath(); ctx.fillRect(paddleX, canvas.height-paddleHeight, paddleWidth, paddleHeight); ctx.fillStyle = "#00d2ff"; ctx.fill(); ctx.closePath();
      if(x + dx > canvas.width-10 || x + dx < 10) dx = -dx;
      if(y + dy < 10) dy = -dy; else if(y + dy > canvas.height-10) {
        if(x > paddleX && x < paddleX + paddleWidth) dy = -dy; else location.reload();
      }
      if(rightPressed && paddleX < canvas.width-paddleWidth) paddleX += 7;
      else if(leftPressed && paddleX > 0) paddleX -= 7;
      x += dx; y += dy; requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
