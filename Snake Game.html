<!DOCTYPE html>
<html>
<head>
  <title>GitHub Snake: Pro Edition</title>
  <style>
    body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    canvas { border: 2px solid #4CAF50; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #000; }
    .controls { margin-bottom: 15px; display: flex; gap: 20px; align-items: center; }
    .ui-btn { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4CAF50; border: none; color: white; border-radius: 5px; font-weight: bold; }
    .ui-btn:hover { background: #45a049; }
    .score-board { font-size: 20px; margin-bottom: 10px; }
    #gameOverMsg { color: #FF5252; font-weight: bold; margin-top: 10px; display: none; }
  </style>
</head>
<body>

  <div class="score-board">Score: <span id="scoreVal">0</span></div>

  <div class="controls">
    <button id="startBtn" class="ui-btn">Start / Restart</button>
    <label>
      <input type="checkbox" id="speedToggle"> Slow Mode
    </label>
  </div>

  <canvas id="snake" width="400" height="400"></canvas>
  <div id="gameOverMsg">GAME OVER! Press Start to try again.</div>

  <script>
    const canvas = document.getElementById('snake');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreVal');
    const startBtn = document.getElementById('startBtn');
    const speedToggle = document.getElementById('speedToggle');
    const gameOverMsg = document.getElementById('gameOverMsg');

    let box = 20;
    let score, snake, food, d, gameInterval;
    let isRunning = false;

    function initGame() {
      score = 0;
      scoreEl.innerHTML = score;
      snake = [{x: 9 * box, y: 10 * box}];
      food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
      d = null;
      isRunning = true;
      gameOverMsg.style.display = "none";
      
      if(gameInterval) clearInterval(gameInterval);
      
      // Determine speed: 150ms for slow, 80ms for fast
      let speed = speedToggle.checked ? 150 : 80;
      gameInterval = setInterval(draw, speed);
    }

    document.addEventListener("keydown", e => {
      if(e.keyCode==37 && d!="RIGHT") d="LEFT";
      else if(e.keyCode==38 && d!="DOWN") d="UP";
      else if(e.keyCode==39 && d!="LEFT") d="RIGHT";
      else if(e.keyCode==40 && d!="UP") d="DOWN";
    });

    startBtn.addEventListener("click", initGame);

    function draw() {
      if (!isRunning) return;

      ctx.fillStyle = "black";
      ctx.fillRect(0,0,400,400);

      for(let i=0; i<snake.length; i++) {
        ctx.fillStyle = (i==0) ? "#4CAF50" : "#81C784";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
      }

      ctx.fillStyle = "#FF5252";
      ctx.fillRect(food.x, food.y, box, box);

      let sX = snake[0].x;
      let sY = snake[0].y;

      if(d=="LEFT") sX -= box;
      if(d=="UP") sY -= box;
      if(d=="RIGHT") sX += box;
      if(d=="DOWN") sY += box;

      if(sX == food.x && sY == food.y) {
        score++;
        scoreEl.innerHTML = score;
        food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
      } else {
        if(d) snake.pop(); // Only move if a direction is set
      }

      let newHead = {x: sX, y: sY};

      // Collision Detection
      if(d && (sX<0 || sX>=400 || sY<0 || sY>=400 || snake.some(c => c.x==sX && c.y==sY))) {
        isRunning = false;
        clearInterval(gameInterval);
        gameOverMsg.style.display = "block";
      }

      if(d) snake.unshift(newHead);
    }
  </script>
</body>
</html>
